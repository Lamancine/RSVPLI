<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Registry - Lara & Iosif</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <script src="auth-check.js"></script>

  <!-- Mobile Header -->
  <div class="mobile-header">
    <span class="mobile-header-logo">L&I</span>
  </div>

  <!-- Hamburger Menu for Mobile -->
  <div class="hamburger-menu" id="hamburgerMenu">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <!-- Mobile Navigation Menu -->
  <nav class="mobile-nav" id="mobileNav">
    <a href="index.html" data-i18n="nav_home">Home</a>
    <a href="venue.html" data-i18n="nav_venue">Venue</a>
    <a href="accommodation.html" data-i18n="nav_accommodation">Accommodation</a>
    <a href="faq.html" data-i18n="nav_faq">FAQ</a>
    <a href="registry.html" data-i18n="nav_registry">Wedding Registry</a>
    <a href="rsvp.html" data-i18n="nav_rsvp">RSVP</a>
    <a href="#" id="logoutBtn" data-i18n="nav_logout">Logout</a>
  </nav>

  <!-- Floral Arch Hero Section -->
  <div class="hero-section">
    <h1 class="hero-title" data-i18n="hero_title">LARA & IOSIF</h1>
    <p class="hero-date" data-i18n="wedding_date">SEPTEMBER 4, 2026</p>
    <p class="hero-countdown" id="countdownMessage">Loading...</p>
  </div>

  <!-- Navigation Menu -->
  <nav class="hero-nav">
    <ul class="nav-links">
      <li><a href="index.html" data-i18n="nav_home">Home</a></li>
      <li><a href="venue.html" data-i18n="nav_venue">Venue</a></li>
      <li><a href="accommodation.html" data-i18n="nav_accommodation">Accommodation</a></li>
      <li><a href="faq.html" data-i18n="nav_faq">FAQ</a></li>
      <li><a href="registry.html" data-i18n="nav_registry">Wedding Registry</a></li>
      <li><a href="rsvp.html" data-i18n="nav_rsvp">RSVP</a></li>
      <li><a href="#" id="logoutBtn" style="color: #999; border-bottom: none; padding-left: 20px; font-size: 13px;" data-i18n="nav_logout">Logout</a></li>
    </ul>
  </nav>

  <!-- Language Selector -->
  <div class="language-selector" style="position: fixed; top: 20px; right: 40px; display: flex; gap: 8px; z-index: 100; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(4px); padding: 4px 6px; border-radius: 2px; box-shadow: 0 1px 4px rgba(65, 64, 66, 0.1);">
    <button class="lang-btn" data-lang="en" data-i18n="lang_en" onclick="setLanguage('en')">EN</button>
    <button class="lang-btn" data-lang="fr" data-i18n="lang_fr" onclick="setLanguage('fr')">FR</button>
    <button class="lang-btn" data-lang="el" data-i18n="lang_el" onclick="setLanguage('el')">EL</button>
  </div>

  <!-- Page Header -->
  <section class="page-header">
    <h1 data-i18n="registry_heading">Wedding Registry</h1>
  </section>

  <!-- Registry Content -->
  <section class="content-section">
    <div class="container">
      <div class="content-card">

        <!-- Thank-you message -->
        <div style="background: #f9f5ef; border-left: 3px solid #c9a227; padding: 24px 28px; margin-bottom: 40px; line-height: 1.8;">
          <p data-i18n="registry_thank_you" style="margin: 0; font-size: 16px; color: var(--text);"></p>
        </div>

        <!-- Registry box -->
        <div style="text-align: center; padding: 40px 20px;">
          <p style="font-size: 14px; letter-spacing: 2px; text-transform: uppercase; color: #999; margin-bottom: 20px;" data-i18n="registry_code_label">Access code</p>
          <div style="display: inline-block; background: var(--ink); color: #fff; font-size: 28px; letter-spacing: 6px; padding: 16px 36px; font-weight: 300; margin-bottom: 36px;">LARAIOSIF4</div>
          <br>
          <a href="https://www.millemercismariage.com/larakaiiosif/liste.html"
             target="_blank"
             rel="noopener noreferrer"
             class="link-btn"
             data-i18n="registry_visit_btn"
             style="display: inline-block; margin-top: 8px;">Visit the Registry</a>
        </div>

      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <p><span data-i18n="footer_text">© 2026 Our Wedding. All rights reserved.</span></p>
  </footer>

  <script src="i18n.js"></script>
  <script src="content-loader.js"></script>
  <script src="navigation.js"></script>
  <script>
    // Countdown
    function calculateAndUpdateCountdown() {
      const countdownEl = document.getElementById('countdownMessage');
      if (!countdownEl) return;
      const now = new Date();
      const weddingDate = new Date(2026, 8, 4);
      const timeDiff = weddingDate.getTime() - now.getTime();
      if (timeDiff <= 0) { countdownEl.textContent = 'The Wedding Day!'; return; }
      const days = Math.ceil(timeDiff / (1000 * 60 * 60 * 24));
      countdownEl.textContent = 'THE FINAL COUNTDOWN : ' + days + ' days';
    }
    calculateAndUpdateCountdown();
    setInterval(calculateAndUpdateCountdown, 60000);
    document.addEventListener('languageChanged', calculateAndUpdateCountdown);

    // Hamburger Menu Toggle
    const hamburger = document.getElementById('hamburgerMenu');
    const mobileNav = document.getElementById('mobileNav');

    hamburger.addEventListener('click', function() {
      hamburger.classList.toggle('active');
      mobileNav.classList.toggle('active');
    });

    const mobileNavLinks = mobileNav.querySelectorAll('a');
    mobileNavLinks.forEach(link => {
      link.addEventListener('click', function() {
        hamburger.classList.remove('active');
        mobileNav.classList.remove('active');
      });
    });
  </script>
</body>
</html>
