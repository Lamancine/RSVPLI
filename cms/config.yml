backend:
  name: git-gateway
  branch: main

locale: fr

media_folder: "images"
public_folder: "/images"

collections:

  # -------------------------------------------------------
  # TEXTES DU SITE — modifier tous les textes des pages
  # -------------------------------------------------------
  - name: "texts"
    label: "✏️ Textes du site"
    files:
      - name: "all"
        label: "Tous les textes (Accueil, Lieu, Pied de page)"
        file: "_data/texts.json"
        fields:

          # TITRE PRINCIPAL (toutes les pages)
          - name: "hero_title_fr"
            label: "Titre principal — Français (affiché sur toutes les pages)"
            widget: "string"
          - name: "hero_title_en"
            label: "Main title — English (displayed on all pages)"
            widget: "string"
          - name: "hero_title_el"
            label: "Κύριος τίτλος — Ελληνικά (εμφανίζεται σε όλες τις σελίδες)"
            widget: "string"

          - name: "wedding_date_fr"
            label: "Date du mariage — Français (ex: 4 SEPTEMBRE 2026)"
            widget: "string"
          - name: "wedding_date_en"
            label: "Wedding date — English (e.g. SEPTEMBER 4, 2026)"
            widget: "string"
          - name: "wedding_date_el"
            label: "Ημερομηνία γάμου — Ελληνικά"
            widget: "string"

          # PAGE D'ACCUEIL
          - name: "story_heading_fr"
            label: "Accueil — Titre de la section (Français)"
            widget: "string"
          - name: "story_heading_en"
            label: "Accueil — Section title (English)"
            widget: "string"
          - name: "story_heading_el"
            label: "Αρχική — Τίτλος ενότητας (Ελληνικά)"
            widget: "string"

          - name: "welcome_text_1_fr"
            label: "Accueil — 1er paragraphe (Français)"
            widget: "text"
          - name: "welcome_text_1_en"
            label: "Accueil — 1st paragraph (English)"
            widget: "text"
          - name: "welcome_text_1_el"
            label: "Αρχική — 1η παράγραφος (Ελληνικά)"
            widget: "text"

          - name: "welcome_text_2_fr"
            label: "Accueil — 2e paragraphe (Français)"
            widget: "text"
          - name: "welcome_text_2_en"
            label: "Accueil — 2nd paragraph (English)"
            widget: "text"
          - name: "welcome_text_2_el"
            label: "Αρχική — 2η παράγραφος (Ελληνικά)"
            widget: "text"

          - name: "child_free_notice_fr"
            label: "Accueil — Notice mariage sans enfants (Français)"
            widget: "string"
          - name: "child_free_notice_en"
            label: "Accueil — Child-free notice (English)"
            widget: "string"
          - name: "child_free_notice_el"
            label: "Αρχική — Γάμος χωρίς παιδιά (Ελληνικά)"
            widget: "string"

          - name: "quick_links_venue_desc_fr"
            label: "Accueil — Carte Lieu : description (Français)"
            widget: "string"
          - name: "quick_links_venue_desc_en"
            label: "Accueil — Venue card: description (English)"
            widget: "string"
          - name: "quick_links_venue_desc_el"
            label: "Αρχική — Κάρτα χώρου: περιγραφή (Ελληνικά)"
            widget: "string"

          - name: "quick_links_accommodation_desc_fr"
            label: "Accueil — Carte Hébergement : description (Français)"
            widget: "string"
          - name: "quick_links_accommodation_desc_en"
            label: "Accueil — Accommodation card: description (English)"
            widget: "string"
          - name: "quick_links_accommodation_desc_el"
            label: "Αρχική — Κάρτα καταλύματος: περιγραφή (Ελληνικά)"
            widget: "string"

          - name: "quick_links_faq_desc_fr"
            label: "Accueil — Carte FAQ : description (Français)"
            widget: "text"
          - name: "quick_links_faq_desc_en"
            label: "Accueil — FAQ card: description (English)"
            widget: "text"
          - name: "quick_links_faq_desc_el"
            label: "Αρχική — Κάρτα FAQ: περιγραφή (Ελληνικά)"
            widget: "text"

          - name: "quick_links_registry_fr"
            label: "Accueil — Carte Liste de Mariage : titre (Français)"
            widget: "string"
          - name: "quick_links_registry_en"
            label: "Accueil — Registry card: title (English)"
            widget: "string"
          - name: "quick_links_registry_el"
            label: "Αρχική — Κάρτα λίστας: τίτλος (Ελληνικά)"
            widget: "string"
          - name: "quick_links_registry_desc_fr"
            label: "Accueil — Carte Liste de Mariage : description (Français)"
            widget: "string"
          - name: "quick_links_registry_desc_en"
            label: "Accueil — Registry card: description (English)"
            widget: "string"
          - name: "quick_links_registry_desc_el"
            label: "Αρχική — Κάρτα λίστας: περιγραφή (Ελληνικά)"
            widget: "string"
          - name: "quick_links_registry_btn_fr"
            label: "Accueil — Carte Liste de Mariage : bouton (Français)"
            widget: "string"
          - name: "quick_links_registry_btn_en"
            label: "Accueil — Registry card: button (English)"
            widget: "string"
          - name: "quick_links_registry_btn_el"
            label: "Αρχική — Κάρτα λίστας: κουμπί (Ελληνικά)"
            widget: "string"

          # PAGE LIEU
          - name: "venue_intro_fr"
            label: "Lieu — Texte d'introduction (Français)"
            widget: "string"
          - name: "venue_intro_en"
            label: "Lieu — Introduction text (English)"
            widget: "string"
          - name: "venue_intro_el"
            label: "Χώρος — Εισαγωγικό κείμενο (Ελληνικά)"
            widget: "string"

          - name: "venue_description_fr"
            label: "Lieu — Description principale (Français)"
            widget: "text"
          - name: "venue_description_en"
            label: "Lieu — Main description (English)"
            widget: "text"
          - name: "venue_description_el"
            label: "Χώρος — Κύρια περιγραφή (Ελληνικά)"
            widget: "text"

          - name: "venue_heading_fr"
            label: "Lieu — Titre de la page (Français)"
            widget: "string"
          - name: "venue_heading_en"
            label: "Lieu — Page title (English)"
            widget: "string"
          - name: "venue_heading_el"
            label: "Χώρος — Τίτλος σελίδας (Ελληνικά)"
            widget: "string"

          - name: "accommodation_heading_fr"
            label: "Hébergements — Titre de la page (Français)"
            widget: "string"
          - name: "accommodation_heading_en"
            label: "Accommodation — Page title (English)"
            widget: "string"
          - name: "accommodation_heading_el"
            label: "Διαμονή — Τίτλος σελίδας (Ελληνικά)"
            widget: "string"

          - name: "faq_heading_fr"
            label: "FAQ — Titre de la page (Français)"
            widget: "string"
          - name: "faq_heading_en"
            label: "FAQ — Page title (English)"
            widget: "string"
          - name: "faq_heading_el"
            label: "FAQ — Τίτλος σελίδας (Ελληνικά)"
            widget: "string"

          - name: "rsvp_heading_fr"
            label: "RSVP — Titre de la page (Français)"
            widget: "string"
          - name: "rsvp_heading_en"
            label: "RSVP — Page title (English)"
            widget: "string"
          - name: "rsvp_heading_el"
            label: "RSVP — Τίτλος σελίδας (Ελληνικά)"
            widget: "string"

          # PAGE LISTE DE MARIAGE
          - name: "registry_heading_fr"
            label: "Liste de Mariage — Titre de la page (Français)"
            widget: "string"
          - name: "registry_heading_en"
            label: "Wedding Registry — Page title (English)"
            widget: "string"
          - name: "registry_heading_el"
            label: "Λίστα Γάμου — Τίτλος σελίδας (Ελληνικά)"
            widget: "string"

          - name: "registry_thank_you_fr"
            label: "Liste de Mariage — Message de remerciement (Français)"
            widget: "text"
          - name: "registry_thank_you_en"
            label: "Wedding Registry — Thank-you message (English)"
            widget: "text"
          - name: "registry_thank_you_el"
            label: "Λίστα Γάμου — Μήνυμα ευχαριστίας (Ελληνικά)"
            widget: "text"

          # PIED DE PAGE
          - name: "footer_text_fr"
            label: "Pied de page (Français)"
            widget: "string"
          - name: "footer_text_en"
            label: "Footer (English)"
            widget: "string"
          - name: "footer_text_el"
            label: "Υποσέλιδο (Ελληνικά)"
            widget: "string"

  # -------------------------------------------------------
  # LIEU — boxes d'info (adresse, programme, parking…)
  # -------------------------------------------------------
  - name: "venue_boxes"
    label: "📍 Lieu — Boxes d'info"
    files:
      - name: "liste"
        label: "Boxes d'information"
        file: "_data/venue_boxes.json"
        fields:
          - name: "items"
            label: "Boxes (tu peux en ajouter, en supprimer et les réordonner)"
            widget: "list"
            summary: "{{fields.title_fr}}"
            fields:
              - name: "icon"
                label: "Icône (emoji, ex: 📍)"
                widget: "string"
              - name: "title_fr"
                label: "Titre — Français"
                widget: "string"
              - name: "title_en"
                label: "Title — English"
                widget: "string"
              - name: "title_el"
                label: "Τίτλος — Ελληνικά"
                widget: "string"
              - name: "content_fr"
                label: "Contenu — Français"
                widget: "text"
              - name: "content_en"
                label: "Content — English"
                widget: "text"
              - name: "content_el"
                label: "Περιεχόμενο — Ελληνικά"
                widget: "text"

  # -------------------------------------------------------
  # FORMULAIRE RSVP — modifier les questions
  # -------------------------------------------------------
  - name: "rsvp_config"
    label: "📋 Formulaire RSVP"
    files:
      - name: "questions"
        label: "Questions du formulaire RSVP"
        file: "_data/rsvp_config.json"
        fields:
          - name: "sections"
            label: "Sections (tu peux en ajouter, en supprimer et les réordonner)"
            widget: "list"
            summary: "{{fields.label_fr}}"
            fields:
              - name: "id"
                label: "Identifiant technique (ne pas modifier)"
                widget: "string"
              - name: "enabled"
                label: "Afficher cette section ?"
                widget: "boolean"
                default: true
              - name: "type"
                label: "Type de question"
                widget: "select"
                options:
                  - label: "Cases à cocher — choix multiples"
                    value: "multi"
                  - label: "Boutons radio — choix unique"
                    value: "single"
              - name: "required"
                label: "Réponse obligatoire ?"
                widget: "boolean"
                default: false
                required: false
              - name: "label_fr"
                label: "Question — Français"
                widget: "text"
              - name: "label_en"
                label: "Question — English"
                widget: "text"
              - name: "label_el"
                label: "Ερώτηση — Ελληνικά"
                widget: "text"
              - name: "options"
                label: "Options de réponse"
                widget: "list"
                summary: "{{fields.label_fr}}"
                fields:
                  - name: "value"
                    label: "Valeur (technique, en anglais, ne pas modifier)"
                    widget: "string"
                  - name: "label_fr"
                    label: "Libellé — Français"
                    widget: "string"
                  - name: "label_en"
                    label: "Label — English"
                    widget: "string"
                  - name: "label_el"
                    label: "Ετικέτα — Ελληνικά"
                    widget: "string"
                  - name: "exclusive"
                    label: "Exclusif (décoche les autres options)"
                    widget: "boolean"
                    default: false
                    required: false
                  - name: "has_text_input"
                    label: "Avec champ texte libre"
                    widget: "boolean"
                    default: false
                    required: false
              - name: "note_fr"
                label: "Note explicative — Français (optionnel)"
                widget: "text"
                required: false
              - name: "note_en"
                label: "Explanatory note — English (optional)"
                widget: "text"
                required: false
              - name: "note_el"
                label: "Επεξηγηματική σημείωση — Ελληνικά (προαιρετικό)"
                widget: "text"
                required: false
              - name: "followup_trigger"
                label: "Valeur qui déclenche une sous-question (optionnel)"
                widget: "string"
                required: false
              - name: "followup_label_fr"
                label: "Sous-question — Français (optionnel)"
                widget: "text"
                required: false
              - name: "followup_label_en"
                label: "Sub-question — English (optional)"
                widget: "text"
                required: false
              - name: "followup_label_el"
                label: "Υποερώτηση — Ελληνικά (προαιρετικό)"
                widget: "text"
                required: false
              - name: "followup_options"
                label: "Options de la sous-question (optionnel)"
                widget: "list"
                required: false
                summary: "{{fields.label_fr}}"
                fields:
                  - name: "value"
                    label: "Valeur (technique)"
                    widget: "string"
                  - name: "label_fr"
                    label: "Libellé — Français"
                    widget: "string"
                  - name: "label_en"
                    label: "Label — English"
                    widget: "string"
                  - name: "label_el"
                    label: "Ετικέτα — Ελληνικά"
                    widget: "string"

  # -------------------------------------------------------
  # FAQ — ajouter / supprimer / modifier des questions
  # -------------------------------------------------------
  - name: "faq"
    label: "❓ FAQ"
    files:
      - name: "questions"
        label: "Questions & Réponses"
        file: "_data/faq.json"
        fields:
          - name: "items"
            label: "Questions (tu peux en ajouter, en supprimer et les réordonner)"
            widget: "list"
            summary: "{{fields.question_fr}}"
            fields:
              - name: "question_fr"
                label: "Question — Français"
                widget: "string"
              - name: "answer_fr"
                label: "Réponse — Français"
                widget: "text"
              - name: "question_en"
                label: "Question — English"
                widget: "string"
              - name: "answer_en"
                label: "Answer — English"
                widget: "text"
              - name: "question_el"
                label: "Ερώτηση — Ελληνικά"
                widget: "string"
              - name: "answer_el"
                label: "Απάντηση — Ελληνικά"
                widget: "text"

  # -------------------------------------------------------
  # HÉBERGEMENTS — ajouter / supprimer / modifier des hôtels
  # -------------------------------------------------------
  - name: "hotels"
    label: "🏨 Hébergements"
    files:
      - name: "liste"
        label: "Liste des hébergements"
        file: "_data/hotels.json"
        fields:
          - name: "intro_fr"
            label: "Texte d'introduction (Français)"
            widget: "text"
          - name: "intro_en"
            label: "Introduction text (English)"
            widget: "text"
          - name: "intro_el"
            label: "Εισαγωγικό κείμενο (Ελληνικά)"
            widget: "text"
          - name: "items"
            label: "Hôtels (tu peux en ajouter, en supprimer et les réordonner)"
            widget: "list"
            summary: "{{fields.name_fr}}"
            fields:
              - name: "name_fr"
                label: "Nom de l'hôtel — Français"
                widget: "string"
              - name: "name_en"
                label: "Hotel name — English"
                widget: "string"
              - name: "name_el"
                label: "Όνομα — Ελληνικά"
                widget: "string"
              - name: "rating_fr"
                label: "Étoiles / catégorie — Français (ex: 4 étoiles)"
                widget: "string"
              - name: "rating_en"
                label: "Stars / category — English"
                widget: "string"
              - name: "rating_el"
                label: "Αξιολόγηση — Ελληνικά"
                widget: "string"
              - name: "distance_fr"
                label: "Distance du lieu — Français (ex: 2 km du lieu)"
                widget: "string"
              - name: "distance_en"
                label: "Distance from venue — English"
                widget: "string"
              - name: "distance_el"
                label: "Απόσταση — Ελληνικά"
                widget: "string"
              - name: "amenities_fr"
                label: "Services inclus — Français (ex: WiFi gratuit, Piscine)"
                widget: "string"
              - name: "amenities_en"
                label: "Amenities — English"
                widget: "string"
              - name: "amenities_el"
                label: "Παροχές — Ελληνικά"
                widget: "string"
              - name: "rate"
                label: "Tarif par nuit (ex: €120 / nuit)"
                widget: "string"
              - name: "booking_url"
                label: "Lien de réservation Booking.com (optionnel)"
                widget: "string"
                required: false
                default: ""
              - name: "note_fr"
                label: "Note spéciale (Français)"
                widget: "text"
                required: false
                default: ""
              - name: "note_en"
                label: "Special note (English)"
                widget: "text"
                required: false
                default: ""
              - name: "note_el"
                label: "Ειδική σημείωση (Ελληνικά)"
                widget: "text"
                required: false
                default: ""
